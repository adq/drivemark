name: Deploy site to GitHub Pages

# Publishes the static site in site/ to GitHub Pages.
# One-time setup: repo Settings -> Pages -> Build and deployment -> Source: "GitHub Actions".
# Custom domain (site/CNAME): drivemark.lidskialf.net
# Site URL: https://drivemark.lidskialf.net/

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'chrome-extension/icons/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
      - name: Vendor extension icons into site
        run: cp -r chrome-extension/icons site/icons
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v5
