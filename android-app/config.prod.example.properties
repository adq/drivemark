# Copy this file to config.prod.properties and set your production OAuth client ID.
# Used by release builds.
#
# This MUST be the "Web application" OAuth client ID, NOT the Android one.
# Both end in .apps.googleusercontent.com and look identical, but pasting the
# Android client ID here makes sign-in fail after the account picker with
# "Developer console is not set up correctly". See docs/android-development.md.
webClientId=YOUR_WEB_CLIENT_ID.apps.googleusercontent.com
